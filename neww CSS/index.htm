<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media CSS</title>

    <style>
        body {
            background-color: lightblue;
        }

        @media only screen and (max-width: 455px) {
            body {
                background-color: rgb(15, 111, 15);
            }
            .boxes {
                flex-direction: column;
            }
        }
        
        .boxes {
            display: flex;
        }
            

        .box {
            width: 344px;
            height: 344px;
            background-color: lightgreen;
            padding: 3px;
            margin: 3px;

        }
        .box h1 {
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            display: flex;

        }
    </style>

</head>

<body>
    <div>
        here is the kuch to media ka chiz okkeeeee!!!
    </div>
    <div class="boxes">
        <div class="box">
            <h1>The King Of The Pirates, Monkey D. Luffy</h1>
        </div>
        <div class="box">
            <h1>King Of Hell, Roronoa Zoro</h1>
        </div>
        <div class="box">
            <h1>Black Leg, Vinsmoke Sanji</h1>
        </div>
    </div>
</body>

</html>
